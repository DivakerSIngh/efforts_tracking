version: "3.9"

services:

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    env_file: ./src/backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
